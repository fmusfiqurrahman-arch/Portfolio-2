<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRF Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <!-- Login Screen -->
    <div class="adm-login-screen" id="adm-login-screen">
        <div class="adm-login-card">
            <div class="adm-login-logo">
                <div class="adm-login-logo-mark">MRF</div>
                <span>Photography &mdash; Admin Panel</span>
            </div>
            <h2>Sign in to continue</h2>
            <div class="adm-login-error" id="adm-login-error">Invalid username or password.</div>
            <div class="adm-field">
                <label for="adm-username">Username</label>
                <input type="text" id="adm-username" class="adm-input" placeholder="admin" autocomplete="username">
            </div>
            <div class="adm-field">
                <label for="adm-password">Password</label>
                <input type="password" id="adm-password" class="adm-input" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="adm-btn adm-btn--primary adm-w-full" id="adm-login-btn" style="margin-top:0.5rem; justify-content:center; padding:0.7rem;">
                Sign In
            </button>
        </div>
    </div>

    <!-- Admin App -->
    <div class="adm-app" id="adm-app">
        <div class="adm-layout">

            <!-- Sidebar -->
            <aside class="adm-sidebar">
                <div class="adm-sidebar-brand">
                    <div class="adm-sidebar-brand-name">MRF Admin</div>
                    <div class="adm-sidebar-brand-sub">Photography CMS</div>
                </div>

                <nav class="adm-nav" id="adm-nav">
                    <div class="adm-nav-label">Content</div>
                    <button class="adm-nav-item active" data-section="about">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M3 21v-2a7 7 0 0 1 14 0v2"/></svg>
                        <span>About &amp; Profile</span>
                    </button>
                    <button class="adm-nav-item" data-section="gear">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 0-14.14 0M20.49 12a8.5 8.5 0 0 1-16.98 0M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41"/></svg>
                        <span>Gear &amp; Tools</span>
                    </button>
                    <button class="adm-nav-item" data-section="experience">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        <span>Experience</span>
                    </button>
                    <button class="adm-nav-item" data-section="albums">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                        <span>Portfolio Albums</span>
                    </button>
                    <button class="adm-nav-item" data-section="featured">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        <span>Featured Story</span>
                    </button>
                    <button class="adm-nav-item" data-section="packages">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                        <span>Packages</span>
                    </button>
                    <button class="adm-nav-item" data-section="testimonials">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span>Testimonials</span>
                    </button>
                    <button class="adm-nav-item" data-section="contact">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <span>Contact Info</span>
                    </button>
                </nav>

                <div class="adm-sidebar-footer">
                    <a href="index.html" target="_blank" class="adm-btn adm-btn--ghost adm-btn--sm">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                        <span>View Site</span>
                    </a>
                    <button class="adm-btn adm-btn--dark adm-btn--sm" id="adm-logout-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        <span>Logout</span>
                    </button>
                </div>
            </aside>

            <!-- Content -->
            <main class="adm-content" id="adm-content-area"></main>
        </div>
    </div>

    <!-- Toast -->
    <div class="adm-toast" id="adm-toast"></div>

    <script src="js/cms.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
