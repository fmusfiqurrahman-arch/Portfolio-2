<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — MRF Photography</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%230a0a0a'/><text x='16' y='22' font-family='Georgia,serif' font-size='17' font-weight='700' fill='%23C9A661' text-anchor='middle'>M</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #080808;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            padding: 2rem;
            text-align: center;
        }

        .wrap {
            max-width: 480px;
            animation: fadeUp .7s cubic-bezier(.16,1,.3,1) forwards;
            opacity: 0;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: #C9A661;
            letter-spacing: .2em;
            text-transform: uppercase;
            margin-bottom: 3rem;
            display: block;
        }

        .number {
            font-family: 'Playfair Display', serif;
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 400;
            color: #1a1a1a;
            line-height: 1;
            letter-spacing: -.04em;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #1a1a1a 0%, #2e2e2e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .line {
            width: 40px;
            height: 1px;
            background: #C9A661;
            margin: 0 auto 1.75rem;
            opacity: .5;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: #e8e2d9;
            margin-bottom: .75rem;
        }

        .desc {
            font-size: .9rem;
            color: #504C48;
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }

        .btn {
            display: inline-block;
            padding: .85rem 2.25rem;
            background: #C9A661;
            color: #080808;
            font-family: 'Inter', sans-serif;
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .16em;
            text-transform: uppercase;
            text-decoration: none;
            transition: background .2s ease, transform .2s ease;
        }
        .btn:hover { background: #A8883F; transform: translateY(-2px); }

        .footer-note {
            margin-top: 2.5rem;
            font-size: .72rem;
            color: #303030;
            letter-spacing: .06em;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <span class="brand">MRF Photography</span>
        <div class="number">404</div>
        <div class="line"></div>
        <h1 class="title">Page not found.</h1>
        <p class="desc">The page you're looking for doesn't exist or has been moved.<br>Let's get you back to where the good photos are.</p>
        <a href="index.html" class="btn">Back to Portfolio</a>
        <p class="footer-note">Or <a href="index.html#contact" style="color:#C9A661;text-decoration:none;">get in touch</a> if you need help.</p>
    </div>
</body>
</html>
